<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>カメラ+GPS最小サンプル</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    padding: 16px;
  }
  h1 { font-size: 18px; margin-bottom: 12px; }
  #video, #photo {
    width: 100%;
    max-width: 480px;
    border-radius: 8px;
    background: #000;
    display: block;
    margin-bottom: 12px;
  }
  button {
    background: #2a7a4b;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-right: 8px;
    margin-bottom: 12px;
  }
  button:disabled { background: #999; }
  #status { font-size: 13px; color: #5f5e5a; margin-bottom: 12px; }
  #gpsStatus {
    font-size: 12px;
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    background: #e8f4ec;
    color: #1a5e35;
    margin-bottom: 12px;
  }
  #gpsStatus.waiting { background: #fdf3e1; color: #b97a1a; }
  .card {
    background: #fff;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 12px;
    display: none;
  }
</style>
</head>
<body>

<h1>カメラ+GPS最小サンプル</h1>
<p id="status">カメラを起動しています…</p>
<span id="gpsStatus" class="waiting">位置情報 取得中…</span>

<video id="video" autoplay playsinline muted></video>

<button id="shootBtn" disabled>撮影する</button>
<button id="retakeBtn" style="display:none;">撮り直す</button>

<img id="photo" style="display:none;" alt="撮影した写真" />
<div class="card" id="infoCard"></div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const photo = document.getElementById('photo');
  const shootBtn = document.getElementById('shootBtn');
  const retakeBtn = document.getElementById('retakeBtn');
  const status = document.getElementById('status');
  const gpsStatus = document.getElementById('gpsStatus');
  const infoCard = document.getElementById('infoCard');

  // 撮影ボタンが押された「その瞬間」に使えるよう、最新の位置情報を保持しておく
  let lastPosition = null;

  // カメラ起動
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' } },
    audio: false
  }).then((stream) => {
    video.srcObject = stream;
    status.textContent = 'カメラが起動しました。撮影ボタンを押してください。';
    shootBtn.disabled = false;
  }).catch((err) => {
    status.textContent = 'カメラを起動できませんでした: ' + err.message;
  });

  // 位置情報は watchPosition で継続的に更新し続け、常に最新の現在地を保持する
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      (pos) => {
        lastPosition = pos.coords;
        gpsStatus.textContent = '位置情報 取得済み (精度 約' + Math.round(pos.coords.accuracy) + 'm)';
        gpsStatus.classList.remove('waiting');
      },
      (err) => {
        gpsStatus.textContent = '位置情報 取得失敗: ' + err.message;
      },
      { enableHighAccuracy: true }
    );
  } else {
    gpsStatus.textContent = '位置情報 利用不可';
  }

  shootBtn.addEventListener('click', () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    photo.src = canvas.toDataURL('image/jpeg', 0.9);
    photo.style.display = 'block';
    video.style.display = 'none';
    shootBtn.style.display = 'none';
    retakeBtn.style.display = 'inline-block';

    // 撮影した瞬間の位置情報とタイムスタンプを写真に紐付けて表示する
    const now = new Date();
    infoCard.style.display = 'block';
    if (lastPosition) {
      infoCard.innerHTML =
        '撮影日時: ' + now.toLocaleString('ja-JP') + '<br>' +
        '緯度: ' + lastPosition.latitude.toFixed(6) + '<br>' +
        '経度: ' + lastPosition.longitude.toFixed(6) + '<br>' +
        '精度: 約' + Math.round(lastPosition.accuracy) + 'm';
    } else {
      infoCard.innerHTML =
        '撮影日時: ' + now.toLocaleString('ja-JP') + '<br>' +
        '位置情報: まだ取得できていません';
    }

    status.textContent = '撮影しました。';
  });

  retakeBtn.addEventListener('click', () => {
    photo.style.display = 'none';
    infoCard.style.display = 'none';
    video.style.display = 'block';
    shootBtn.style.display = 'inline-block';
    retakeBtn.style.display = 'none';
    status.textContent = 'カメラが起動しました。撮影ボタンを押してください。';
  });
</script>

</body>
</html>

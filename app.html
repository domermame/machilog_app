<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MachiLog</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    padding: 16px;
    padding-bottom: 84px; /* 下部タブバーの分だけ余白 */
  }
  h1 { font-size: 18px; margin-bottom: 4px; }
  h2 { font-size: 14px; margin: 20px 0 10px; color: #5f5e5a; }
  #status { font-size: 13px; color: #5f5e5a; margin-bottom: 12px; }
  #gpsStatus {
    font-size: 12px;
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    background: #e8f4ec;
    color: #1a5e35;
    margin-bottom: 12px;
  }
  #gpsStatus.waiting { background: #fdf3e1; color: #b97a1a; }

  section.tab-panel { display: none; }
  section.tab-panel.active { display: block; }

  #video, #capturedPhoto {
    width: 100%;
    max-width: 480px;
    border-radius: 8px;
    background: #000;
    display: block;
    margin-bottom: 12px;
  }
  button {
    background: #2a7a4b;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-right: 8px;
    margin-bottom: 12px;
  }
  button.secondary { background: #7a7a76; }
  button.danger { background: #b93a1a; }
  button:disabled { background: #999; }
  #micBtn.recording { background: #b93a1a; }

  textarea {
    width: 100%;
    max-width: 480px;
    min-height: 100px;
    font-size: 15px;
    line-height: 1.7;
    padding: 12px;
    border-radius: 8px;
    border: 0.5px solid rgba(0,0,0,0.2);
    background: #fff;
    color: #1a1a18;
    display: block;
    margin-bottom: 8px;
  }
  input[type="text"] {
    width: 100%;
    max-width: 480px;
    font-size: 15px;
    padding: 12px;
    border-radius: 8px;
    border: 0.5px solid rgba(0,0,0,0.2);
    background: #fff;
    color: #1a1a18;
    display: block;
    margin-bottom: 12px;
  }

  #editPanel { display: none; }
  canvas { display: none; }

  .spot-card, .spot-pick {
    display: flex;
    gap: 12px;
    align-items: center;
    background: #fff;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
    max-width: 480px;
  }
  .spot-card img, .spot-pick img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .spot-info, .spot-pick .info { font-size: 12px; color: #5f5e5a; line-height: 1.6; overflow: hidden; }
  .spot-info .memo, .spot-pick .info .memo { color: #1a1a18; font-size: 13px; margin-top: 4px; }
  .spot-pick input[type="checkbox"] { width: 20px; height: 20px; flex-shrink: 0; }

  .album-card {
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
    max-width: 480px;
  }
  .album-card h3 { font-size: 15px; margin-bottom: 4px; }
  .album-meta { font-size: 12px; color: #5f5e5a; margin-bottom: 10px; }
  .album-photos {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }
  .album-photos img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; }

  #emptySpots, #emptyAlbums, #emptyWalks { font-size: 13px; color: #5f5e5a; }

  #routeMap {
    height: 300px;
    width: 100%;
    max-width: 480px;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  #routeStatus {
    font-size: 13px;
    color: #5f5e5a;
    margin-bottom: 12px;
  }
  .walk-card {
    background: #fff;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    max-width: 480px;
    font-size: 13px;
    color: #5f5e5a;
    cursor: pointer;
  }
  .walk-card .walk-title { color: #1a1a18; font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .walk-card.selected { outline: 2px solid #2a7a4b; }

  /* ---- 下部タブバー ---- */
  .tabbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    display: flex;
    background: #fff;
    border-top: 0.5px solid rgba(0,0,0,0.15);
    padding: 6px 0 max(6px, env(safe-area-inset-bottom));
  }
  .tabbar button {
    flex: 1;
    margin: 0;
    background: none;
    color: #5f5e5a;
    border-radius: 0;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 4px;
  }
  .tabbar button.active { color: #2a7a4b; font-weight: 700; }
</style>
</head>
<body>

<h1>MachiLog</h1>

<!-- ============ 撮るタブ ============ -->
<section id="tab-record" class="tab-panel active">
  <p id="status">カメラを起動しています…</p>
  <span id="gpsStatus" class="waiting">位置情報 取得中…</span>

  <div id="cameraPanel">
    <video id="video" autoplay playsinline muted></video>
    <button id="shootBtn" disabled>この場所を撮影する</button>
  </div>

  <div id="editPanel">
    <img id="capturedPhoto" alt="撮影した写真" />
    <p id="editInfo" style="font-size:13px; color:#5f5e5a; margin-bottom:8px;"></p>

    <button id="micBtn">音声入力開始</button>
    <textarea id="memo" placeholder="メモ内容(音声入力 or 手入力)"></textarea>

    <div>
      <button id="saveSpotBtn">この記録を保存</button>
      <button id="retakeBtn" class="secondary">撮り直す</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>
</section>

<!-- ============ ルートタブ ============ -->
<section id="tab-route" class="tab-panel">
  <p id="routeStatus">「散歩スタート」を押すと、歩いた道を記録します。</p>
  <button id="walkToggleBtn">散歩スタート</button>
  <div id="routeMap"></div>

  <h2>過去の散歩</h2>
  <div id="walkList"></div>
  <p id="emptyWalks">まだ記録した散歩ルートがありません。</p>
</section>

<!-- ============ 記録一覧タブ ============ -->
<section id="tab-list" class="tab-panel">
  <h2>記録した場所(<span id="spotCount">0</span>件)</h2>
  <div id="spotList"></div>
  <p id="emptySpots">まだ記録がありません。「撮る」タブから記録してください。</p>
  <button id="clearAllBtn" class="danger">全記録をクリア</button>
</section>

<!-- ============ アルバムタブ ============ -->
<section id="tab-album" class="tab-panel">
  <h2>記録から選ぶ</h2>
  <p id="spotIntro" style="font-size:13px; color:#5f5e5a; margin-bottom:12px;"></p>
  <div id="spotPickList"></div>

  <h2>タイトルをつけて作成</h2>
  <input type="text" id="albumTitle" placeholder="例: ○○町歴史散歩" />
  <button id="createAlbumBtn">選択した写真でアルバムを作成</button>

  <h2>作成済みアルバム</h2>
  <div id="albumList"></div>
  <p id="emptyAlbums">まだアルバムがありません。</p>
</section>

<!-- ============ 下部タブバー ============ -->
<nav class="tabbar">
  <button data-tab="record" class="active">📷 撮る</button>
  <button data-tab="route">🗺 ルート</button>
  <button data-tab="list">📋 記録一覧</button>
  <button data-tab="album">📖 アルバム</button>
</nav>

<script>
  const STORAGE_KEY = 'machilog_walk_demo_spots';
  const ALBUMS_KEY = 'machilog_albums_demo';
  const WALKS_KEY = 'machilog_walks_demo';

  let spots = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let albums = JSON.parse(localStorage.getItem(ALBUMS_KEY) || '[]');
  let walks = JSON.parse(localStorage.getItem(WALKS_KEY) || '[]');

  // ============ タブ切り替え ============
  const tabButtons = document.querySelectorAll('.tabbar button');
  const tabPanels = {
    record: document.getElementById('tab-record'),
    route: document.getElementById('tab-route'),
    list: document.getElementById('tab-list'),
    album: document.getElementById('tab-album')
  };
  let cameraStarted = false;

  tabButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.tab;

      tabButtons.forEach((b) => b.classList.toggle('active', b === btn));
      Object.entries(tabPanels).forEach(([key, panel]) => {
        panel.classList.toggle('active', key === target);
      });

      // 「撮る」タブにいる間だけカメラを起動し、離れたら停止する(発熱・電池消耗を抑えるため)
      if (target === 'record') {
        if (!cameraStarted) startCamera();
      } else {
        if (cameraStarted) stopCamera();
      }
      // 一覧・アルバムタブは開くたびに最新のデータで再描画する
      if (target === 'list') renderSpots();
      if (target === 'album') { renderSpotPicks(); renderAlbums(); }
      // ルートタブは、地図(Leaflet)が非表示状態では正しく初期化できないため、表示された時に初期化・サイズ再計算する
      if (target === 'route') {
        initRouteMapIfNeeded();
        setTimeout(() => routeMap.invalidateSize(), 0);
        renderWalks();
      }
    });
  });

  // ============ 撮るタブ: カメラ ============
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const capturedPhoto = document.getElementById('capturedPhoto');
  const cameraPanel = document.getElementById('cameraPanel');
  const editPanel = document.getElementById('editPanel');
  const shootBtn = document.getElementById('shootBtn');
  const retakeBtn = document.getElementById('retakeBtn');
  const saveSpotBtn = document.getElementById('saveSpotBtn');
  const memo = document.getElementById('memo');
  const micBtn = document.getElementById('micBtn');
  const status = document.getElementById('status');
  const gpsStatus = document.getElementById('gpsStatus');
  const editInfo = document.getElementById('editInfo');

  let lastPosition = null;
  let pendingPhotoDataUrl = null;
  let pendingPosition = null;
  let pendingTimestamp = null;
  let cameraStream = null;

  function startCamera() {
    cameraStarted = true;
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    }).then((stream) => {
      cameraStream = stream;
      video.srcObject = stream;
      status.textContent = 'カメラが起動しました。撮影ボタンを押してください。';
      shootBtn.disabled = false;
    }).catch((err) => {
      status.textContent = 'カメラを起動できませんでした: ' + err.message;
    });
  }

  // 他のタブを見ている間もカメラを起動したままだと発熱・電池消耗の原因になるため、
  // 「撮る」タブを離れたらカメラのハードウェアごと完全に停止する
  function stopCamera() {
    if (cameraStream) {
      cameraStream.getTracks().forEach((track) => track.stop());
      cameraStream = null;
    }
    video.srcObject = null;
    cameraStarted = false;
    shootBtn.disabled = true;
  }

  startCamera(); // 最初のタブなので即起動

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      (pos) => {
        lastPosition = pos.coords;
        gpsStatus.textContent = '位置情報 取得済み (精度 約' + Math.round(pos.coords.accuracy) + 'm)';
        gpsStatus.classList.remove('waiting');
        maybeAddRoutePoint(pos.coords);
      },
      (err) => { gpsStatus.textContent = '位置情報 取得失敗: ' + err.message; },
      { enableHighAccuracy: true }
    );
  } else {
    gpsStatus.textContent = '位置情報 利用不可';
  }

  shootBtn.addEventListener('click', () => {
    const maxWidth = 800;
    const scale = Math.min(1, maxWidth / video.videoWidth);
    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

    pendingPhotoDataUrl = canvas.toDataURL('image/jpeg', 0.75);
    pendingPosition = lastPosition;
    pendingTimestamp = new Date().toISOString();

    capturedPhoto.src = pendingPhotoDataUrl;
    editInfo.textContent = pendingPosition
      ? '緯度 ' + pendingPosition.latitude.toFixed(6) + ' / 経度 ' + pendingPosition.longitude.toFixed(6)
      : '位置情報は取得できませんでした';
    memo.value = '';

    cameraPanel.style.display = 'none';
    editPanel.style.display = 'block';
    status.textContent = '写真を確認して、必要ならメモを入力・音声入力してください。';
  });

  retakeBtn.addEventListener('click', () => {
    cameraPanel.style.display = 'block';
    editPanel.style.display = 'none';
    status.textContent = 'カメラが起動しました。撮影ボタンを押してください。';
  });

  saveSpotBtn.addEventListener('click', () => {
    const spot = {
      id: Date.now(),
      timestamp: pendingTimestamp,
      lat: pendingPosition ? pendingPosition.latitude : null,
      lng: pendingPosition ? pendingPosition.longitude : null,
      photo: pendingPhotoDataUrl,
      memo: memo.value
    };
    spots.push(spot);

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(spots));
    } catch (e) {
      status.textContent = '保存容量がいっぱいの可能性があります: ' + e.message;
    }

    cameraPanel.style.display = 'block';
    editPanel.style.display = 'none';
    status.textContent = '記録を保存しました。次の場所へ進みましょう。';
  });

  // ---- 音声入力 ----
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micBtn.disabled = true;
    micBtn.textContent = '音声入力 非対応';
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = true;
    recognition.interimResults = true;

    let isListening = false;
    let baseText = '';

    recognition.addEventListener('start', () => {
      isListening = true;
      baseText = memo.value;
      micBtn.textContent = '音声入力停止';
      micBtn.classList.add('recording');
    });

    recognition.addEventListener('result', (event) => {
      let finalChunk = '';
      let interimText = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) finalChunk += transcript;
        else interimText += transcript;
      }
      if (finalChunk) baseText += finalChunk;
      memo.value = baseText + interimText;
    });

    recognition.addEventListener('error', (event) => {
      status.textContent = '音声認識エラー: ' + event.error;
    });

    recognition.addEventListener('end', () => {
      isListening = false;
      micBtn.textContent = '音声入力開始';
      micBtn.classList.remove('recording');
    });

    micBtn.addEventListener('click', () => {
      if (isListening) recognition.stop();
      else recognition.start();
    });
  }

  // ============ ルートタブ: 散歩ルート記録 ============
  const walkToggleBtn = document.getElementById('walkToggleBtn');
  const routeStatus = document.getElementById('routeStatus');
  const walkList = document.getElementById('walkList');
  const emptyWalks = document.getElementById('emptyWalks');

  const IN_PROGRESS_KEY = 'machilog_current_walk_demo';

  let routeMap = null;
  let routePolyline = null;
  let currentWalk = null; // 記録中の散歩 { id, startedAt, path: [{lat,lng,t}] }
  let selectedWalkId = null; // 一覧から選んで地図表示中の過去の散歩

  // 記録中の散歩は地点を追加するたびに保存しておく。Safariがタブを破棄してページが
  // 再読み込みされても、メモリ上だけにあったcurrentWalkが消えてしまわないようにするため
  function saveInProgressWalk() {
    if (currentWalk) {
      localStorage.setItem(IN_PROGRESS_KEY, JSON.stringify(currentWalk));
    } else {
      localStorage.removeItem(IN_PROGRESS_KEY);
    }
  }

  // 2点間の距離をメートルで計算(緯度経度から距離を出す定番の式)
  function haversineMeters(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = (d) => (d * Math.PI) / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat / 2) ** 2 +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function pathDistance(path) {
    let total = 0;
    for (let i = 1; i < path.length; i++) {
      total += haversineMeters(path[i - 1].lat, path[i - 1].lng, path[i].lat, path[i].lng);
    }
    return total;
  }

  function formatDistance(meters) {
    return meters >= 1000 ? (meters / 1000).toFixed(2) + 'km' : Math.round(meters) + 'm';
  }

  // 地図(Leaflet)は非表示のdivに対して初期化すると崩れるため、ルートタブが最初に開かれた時に初期化する
  function initRouteMapIfNeeded() {
    if (routeMap) return;
    routeMap = L.map('routeMap').setView([35.681236, 139.767125], 15); // 初期表示は東京駅付近
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(routeMap);
    routePolyline = L.polyline([], { color: '#2a7a4b' }).addTo(routeMap);

    if (currentWalk && currentWalk.path.length > 0) {
      // 復元された記録中の散歩があれば、その軌跡を地図にも反映する
      const latlngs = currentWalk.path.map((p) => [p.lat, p.lng]);
      routePolyline.setLatLngs(latlngs);
      routeMap.fitBounds(routePolyline.getBounds(), { padding: [20, 20] });
    } else if (lastPosition) {
      routeMap.setView([lastPosition.latitude, lastPosition.longitude], 16);
    }
  }

  // 記録中の散歩に、意味のある間隔でだけ地点を追加する(密集しすぎないよう間引く)
  function maybeAddRoutePoint(coords) {
    if (!currentWalk) return;
    const now = Date.now();
    const last = currentWalk.path[currentWalk.path.length - 1];

    if (last) {
      const distFromLast = haversineMeters(last.lat, last.lng, coords.latitude, coords.longitude);
      const timeSinceLast = now - last.t;
      // 10m以上動く、または15秒以上経過した場合だけ新しい点を追加する
      if (distFromLast < 10 && timeSinceLast < 15000) return;
    }

    currentWalk.path.push({ lat: coords.latitude, lng: coords.longitude, t: now });
    saveInProgressWalk();
    updateRouteLive();
  }

  function updateRouteLive() {
    const dist = pathDistance(currentWalk.path);
    routeStatus.textContent = '記録中… ' + currentWalk.path.length + '地点 / 距離 約' + formatDistance(dist);

    if (routeMap) {
      const latlngs = currentWalk.path.map((p) => [p.lat, p.lng]);
      routePolyline.setLatLngs(latlngs);
      if (latlngs.length > 0) routeMap.panTo(latlngs[latlngs.length - 1]);
    }
  }

  walkToggleBtn.addEventListener('click', () => {
    initRouteMapIfNeeded();

    if (!currentWalk) {
      // 散歩スタート
      currentWalk = { id: Date.now(), startedAt: new Date().toISOString(), path: [] };
      if (lastPosition) {
        currentWalk.path.push({ lat: lastPosition.latitude, lng: lastPosition.longitude, t: Date.now() });
      }
      routePolyline.setLatLngs([]);
      walkToggleBtn.textContent = '散歩終了';
      walkToggleBtn.classList.add('danger');
      saveInProgressWalk();
      updateRouteLive();
    } else {
      // 散歩終了 → 保存
      if (currentWalk.path.length < 2) {
        alert('記録された地点が少ないため保存しません(移動しながらもう一度お試しください)。');
      } else {
        const walk = {
          id: currentWalk.id,
          startedAt: currentWalk.startedAt,
          endedAt: new Date().toISOString(),
          path: currentWalk.path,
          distance: pathDistance(currentWalk.path)
        };
        walks.push(walk);
        localStorage.setItem(WALKS_KEY, JSON.stringify(walks));
      }
      currentWalk = null;
      saveInProgressWalk(); // currentWalkがnullになったので、記録中データを消す
      walkToggleBtn.textContent = '散歩スタート';
      walkToggleBtn.classList.remove('danger');
      routeStatus.textContent = '「散歩スタート」を押すと、歩いた道を記録します。';
      renderWalks();
    }
  });

  // ページを開いた時点で、前回記録中だった散歩(中断された散歩)があれば復元する
  function restoreInProgressWalk() {
    const saved = localStorage.getItem(IN_PROGRESS_KEY);
    if (!saved) return;

    currentWalk = JSON.parse(saved);
    walkToggleBtn.textContent = '散歩終了';
    walkToggleBtn.classList.add('danger');
    updateRouteLive(); // 記録中の地点数・距離を表示する(routeStatusはここで更新される)
  }
  restoreInProgressWalk();

  function showWalkOnMap(walk) {
    selectedWalkId = walk.id;
    const latlngs = walk.path.map((p) => [p.lat, p.lng]);
    routePolyline.setLatLngs(latlngs);
    if (latlngs.length > 0) {
      routeMap.fitBounds(routePolyline.getBounds(), { padding: [20, 20] });
    }
    renderWalks();
  }

  function renderWalks() {
    emptyWalks.style.display = walks.length === 0 ? 'block' : 'none';
    walkList.innerHTML = '';

    [...walks].reverse().forEach((walk) => {
      const card = document.createElement('div');
      card.className = 'walk-card' + (walk.id === selectedWalkId ? ' selected' : '');
      const started = new Date(walk.startedAt).toLocaleString('ja-JP');
      card.innerHTML =
        '<div class="walk-title">' + started + '</div>' +
        '距離 約' + formatDistance(walk.distance) + ' / ' + walk.path.length + '地点(タップで地図表示)';
      card.addEventListener('click', () => showWalkOnMap(walk));
      walkList.appendChild(card);
    });
  }

  // ============ 記録一覧タブ ============
  const spotList = document.getElementById('spotList');
  const spotCount = document.getElementById('spotCount');
  const emptySpots = document.getElementById('emptySpots');
  const clearAllBtn = document.getElementById('clearAllBtn');

  function renderSpots() {
    spotCount.textContent = spots.length;
    emptySpots.style.display = spots.length === 0 ? 'block' : 'none';
    spotList.innerHTML = '';

    [...spots].reverse().forEach((spot) => {
      const card = document.createElement('div');
      card.className = 'spot-card';
      const time = new Date(spot.timestamp).toLocaleString('ja-JP');
      const locText = (spot.lat != null) ? spot.lat.toFixed(5) + ', ' + spot.lng.toFixed(5) : '位置情報なし';
      card.innerHTML =
        '<img src="' + spot.photo + '" alt="記録した写真" />' +
        '<div class="spot-info">' + time + '<br>' + locText +
          '<div class="memo">' + (spot.memo ? escapeHtml(spot.memo) : '(メモなし)') + '</div>' +
        '</div>';
      spotList.appendChild(card);
    });
  }

  clearAllBtn.addEventListener('click', () => {
    if (!confirm('全ての記録を削除します。よろしいですか？')) return;
    spots = [];
    localStorage.removeItem(STORAGE_KEY);
    renderSpots();
  });

  // ============ アルバムタブ ============
  const spotPickList = document.getElementById('spotPickList');
  const spotIntro = document.getElementById('spotIntro');
  const albumTitle = document.getElementById('albumTitle');
  const createAlbumBtn = document.getElementById('createAlbumBtn');
  const albumList = document.getElementById('albumList');
  const emptyAlbums = document.getElementById('emptyAlbums');

  function renderSpotPicks() {
    const ordered = [...spots].reverse();
    spotIntro.textContent = spots.length + '件の記録があります。アルバムに入れたい写真を選んでください。';
    spotPickList.innerHTML = '';
    ordered.forEach((spot) => {
      const row = document.createElement('label');
      row.className = 'spot-pick';
      const time = new Date(spot.timestamp).toLocaleString('ja-JP');
      row.innerHTML =
        '<input type="checkbox" value="' + spot.id + '" />' +
        '<img src="' + spot.photo + '" alt="記録した写真" />' +
        '<div class="info">' + time +
          '<div class="memo">' + (spot.memo ? escapeHtml(spot.memo).slice(0, 40) : '(メモなし)') + '</div>' +
        '</div>';
      spotPickList.appendChild(row);
    });
  }

  createAlbumBtn.addEventListener('click', () => {
    const title = albumTitle.value.trim();
    if (!title) { alert('アルバムのタイトルを入力してください。'); return; }

    const checked = [...spotPickList.querySelectorAll('input[type="checkbox"]:checked')]
      .map((cb) => Number(cb.value));
    if (checked.length === 0) { alert('写真を1枚以上選んでください。'); return; }

    const selectedSpots = spots.filter((s) => checked.includes(s.id));
    const album = {
      id: Date.now(),
      title: title,
      createdAt: new Date().toISOString(),
      spots: selectedSpots
    };
    albums.push(album);
    localStorage.setItem(ALBUMS_KEY, JSON.stringify(albums));

    albumTitle.value = '';
    renderSpotPicks();
    renderAlbums();
  });

  function renderAlbums() {
    emptyAlbums.style.display = albums.length === 0 ? 'block' : 'none';
    albumList.innerHTML = '';

    [...albums].reverse().forEach((album) => {
      const card = document.createElement('div');
      card.className = 'album-card';
      const created = new Date(album.createdAt).toLocaleString('ja-JP');
      const photosHtml = album.spots.map((s) =>
        '<img src="' + s.photo + '" alt="' + escapeHtml(album.title) + '" />'
      ).join('');

      card.innerHTML =
        '<h3>' + escapeHtml(album.title) + '</h3>' +
        '<div class="album-meta">作成日: ' + created + ' / 写真 ' + album.spots.length + '枚</div>' +
        '<div class="album-photos">' + photosHtml + '</div>' +
        '<button class="danger" data-id="' + album.id + '">このアルバムを削除</button>';
      albumList.appendChild(card);
    });

    albumList.querySelectorAll('button[data-id]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.id);
        if (!confirm('このアルバムを削除します。よろしいですか？')) return;
        albums = albums.filter((a) => a.id !== id);
        localStorage.setItem(ALBUMS_KEY, JSON.stringify(albums));
        renderAlbums();
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  renderSpots();
</script>

</body>
</html>

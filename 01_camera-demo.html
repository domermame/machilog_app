<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>カメラ最小サンプル</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    padding: 16px;
  }
  h1 { font-size: 18px; margin-bottom: 12px; }
  #video, #photo {
    width: 100%;
    max-width: 480px;
    border-radius: 8px;
    background: #000;
    display: block;
    margin-bottom: 12px;
  }
  button {
    background: #2a7a4b;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-right: 8px;
    margin-bottom: 12px;
  }
  button:disabled { background: #999; }
  #status { font-size: 13px; color: #5f5e5a; margin-bottom: 12px; }
</style>
</head>
<body>

<h1>カメラ最小サンプル</h1>
<p id="status">カメラを起動しています…</p>

<!-- カメラ映像を映すプレビュー -->
<video id="video" autoplay playsinline muted></video>

<button id="shootBtn" disabled>撮影する</button>
<button id="retakeBtn" style="display:none;">撮り直す</button>

<!-- 撮影した写真を表示する画像タグ -->
<img id="photo" style="display:none;" alt="撮影した写真" />

<!-- 実際には画面に表示しない作業用キャンバス。video の1コマをここに描いて画像化する -->
<canvas id="canvas" style="display:none;"></canvas>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const photo = document.getElementById('photo');
  const shootBtn = document.getElementById('shootBtn');
  const retakeBtn = document.getElementById('retakeBtn');
  const status = document.getElementById('status');

  // 1. スマホの背面カメラを優先して起動する
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' } },
    audio: false
  }).then((stream) => {
    video.srcObject = stream;
    status.textContent = 'カメラが起動しました。撮影ボタンを押してください。';
    shootBtn.disabled = false;
  }).catch((err) => {
    status.textContent = 'カメラを起動できませんでした: ' + err.message;
  });

  // 2. 「撮影する」を押したら、今の映像の1コマをcanvasに描き、画像として表示する
  shootBtn.addEventListener('click', () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    // canvasの内容をJPEG画像データ(Data URL)に変換して<img>に表示
    photo.src = canvas.toDataURL('image/jpeg', 0.9);
    photo.style.display = 'block';
    video.style.display = 'none';
    shootBtn.style.display = 'none';
    retakeBtn.style.display = 'inline-block';
    status.textContent = '撮影しました。';
  });

  // 3. 「撮り直す」を押したらプレビューに戻る
  retakeBtn.addEventListener('click', () => {
    photo.style.display = 'none';
    video.style.display = 'block';
    shootBtn.style.display = 'inline-block';
    retakeBtn.style.display = 'none';
    status.textContent = 'カメラが起動しました。撮影ボタンを押してください。';
  });
</script>

</body>
</html>

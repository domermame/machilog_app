<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GPS最小サンプル</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    padding: 16px;
  }
  h1 { font-size: 18px; margin-bottom: 12px; }
  button {
    background: #2a7a4b;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  button:disabled { background: #999; }
  #status { font-size: 13px; color: #5f5e5a; margin-bottom: 12px; }
  #coords {
    background: #fff;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 12px;
    display: none;
  }
  #map {
    width: 100%;
    max-width: 480px;
    height: 300px;
    border: none;
    border-radius: 8px;
    display: none;
  }
</style>
</head>
<body>

<h1>GPS最小サンプル</h1>
<p id="status">「現在地を取得」を押してください。</p>

<button id="locateBtn">現在地を取得</button>

<!-- 取得した緯度経度・精度を表示 -->
<div id="coords"></div>

<!-- OpenStreetMapを埋め込んで現在地を地図上に表示(APIキー不要) -->
<iframe id="map"></iframe>

<script>
  const locateBtn = document.getElementById('locateBtn');
  const status = document.getElementById('status');
  const coords = document.getElementById('coords');
  const map = document.getElementById('map');

  locateBtn.addEventListener('click', () => {
    if (!navigator.geolocation) {
      status.textContent = 'この端末では位置情報を利用できません。';
      return;
    }

    status.textContent = '位置情報を取得中…';
    locateBtn.disabled = true;

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude, accuracy } = pos.coords;

        coords.style.display = 'block';
        coords.innerHTML =
          '緯度: ' + latitude.toFixed(6) + '<br>' +
          '経度: ' + longitude.toFixed(6) + '<br>' +
          '精度: 約' + Math.round(accuracy) + 'm';

        // 現在地を中心にした簡易地図を表示(ズームは狭めのbboxで代用)
        const d = 0.01;
        const bbox = [longitude - d, latitude - d, longitude + d, latitude + d].join(',');
        map.src = 'https://www.openstreetmap.org/export/embed.html?bbox=' + bbox +
                   '&marker=' + latitude + ',' + longitude;
        map.style.display = 'block';

        status.textContent = '取得しました。';
        locateBtn.disabled = false;
      },
      (err) => {
        status.textContent = '位置情報を取得できませんでした: ' + err.message;
        locateBtn.disabled = false;
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>街歩き記録 統合サンプル</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    padding: 16px;
    padding-bottom: 60px;
  }
  h1 { font-size: 18px; margin-bottom: 4px; }
  h2 { font-size: 14px; margin: 24px 0 10px; color: #5f5e5a; }
  #status { font-size: 13px; color: #5f5e5a; margin-bottom: 12px; }
  #gpsStatus {
    font-size: 12px;
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    background: #e8f4ec;
    color: #1a5e35;
    margin-bottom: 12px;
  }
  #gpsStatus.waiting { background: #fdf3e1; color: #b97a1a; }

  #video, #capturedPhoto {
    width: 100%;
    max-width: 480px;
    border-radius: 8px;
    background: #000;
    display: block;
    margin-bottom: 12px;
  }
  button {
    background: #2a7a4b;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-right: 8px;
    margin-bottom: 12px;
  }
  button.secondary { background: #7a7a76; }
  button.danger { background: #b93a1a; }
  button:disabled { background: #999; }
  #micBtn.recording { background: #b93a1a; }

  textarea {
    width: 100%;
    max-width: 480px;
    min-height: 100px;
    font-size: 15px;
    line-height: 1.7;
    padding: 12px;
    border-radius: 8px;
    border: 0.5px solid rgba(0,0,0,0.2);
    background: #fff;
    color: #1a1a18;
    display: block;
    margin-bottom: 8px;
  }

  #editPanel { display: none; }

  .spot-card {
    display: flex;
    gap: 12px;
    background: #fff;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
    max-width: 480px;
  }
  .spot-card img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .spot-info { font-size: 12px; color: #5f5e5a; line-height: 1.6; overflow: hidden; }
  .spot-info .memo { color: #1a1a18; font-size: 13px; margin-top: 4px; }
  #emptyMsg { font-size: 13px; color: #5f5e5a; }

  canvas { display: none; }
</style>
</head>
<body>

<h1>街歩き記録 統合サンプル</h1>
<p id="status">カメラを起動しています…</p>
<span id="gpsStatus" class="waiting">位置情報 取得中…</span>

<!-- 撮影パネル -->
<div id="cameraPanel">
  <video id="video" autoplay playsinline muted></video>
  <button id="shootBtn" disabled>この場所を撮影する</button>
</div>

<!-- 撮影後の編集パネル(写真 + GPS + 音声メモ) -->
<div id="editPanel">
  <img id="capturedPhoto" alt="撮影した写真" />
  <p id="editInfo" style="font-size:13px; color:#5f5e5a; margin-bottom:8px;"></p>

  <button id="micBtn">音声入力開始</button>
  <textarea id="memo" placeholder="メモ内容(音声入力 or 手入力)"></textarea>

  <div>
    <button id="saveSpotBtn">この記録を保存</button>
    <button id="retakeBtn" class="secondary">撮り直す</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<h2>記録した場所(<span id="spotCount">0</span>件)</h2>
<div id="spotList"></div>
<p id="emptyMsg">まだ記録がありません。</p>
<button id="clearAllBtn" class="danger">全記録をクリア</button>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const capturedPhoto = document.getElementById('capturedPhoto');
  const cameraPanel = document.getElementById('cameraPanel');
  const editPanel = document.getElementById('editPanel');
  const shootBtn = document.getElementById('shootBtn');
  const retakeBtn = document.getElementById('retakeBtn');
  const saveSpotBtn = document.getElementById('saveSpotBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const memo = document.getElementById('memo');
  const micBtn = document.getElementById('micBtn');
  const status = document.getElementById('status');
  const gpsStatus = document.getElementById('gpsStatus');
  const editInfo = document.getElementById('editInfo');
  const spotList = document.getElementById('spotList');
  const spotCount = document.getElementById('spotCount');
  const emptyMsg = document.getElementById('emptyMsg');

  const STORAGE_KEY = 'machilog_walk_demo_spots';
  let spots = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let lastPosition = null;
  let pendingPhotoDataUrl = null;
  let pendingPosition = null;
  let pendingTimestamp = null;

  // ---- カメラ起動(常時プレビューし続け、撮影のたびに止めない) ----
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' } },
    audio: false
  }).then((stream) => {
    video.srcObject = stream;
    status.textContent = 'カメラが起動しました。撮影ボタンを押してください。';
    shootBtn.disabled = false;
  }).catch((err) => {
    status.textContent = 'カメラを起動できませんでした: ' + err.message;
  });

  // ---- GPSは常にバックグラウンドで最新の現在地を更新し続ける ----
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      (pos) => {
        lastPosition = pos.coords;
        gpsStatus.textContent = '位置情報 取得済み (精度 約' + Math.round(pos.coords.accuracy) + 'm)';
        gpsStatus.classList.remove('waiting');
      },
      (err) => { gpsStatus.textContent = '位置情報 取得失敗: ' + err.message; },
      { enableHighAccuracy: true }
    );
  } else {
    gpsStatus.textContent = '位置情報 利用不可';
  }

  // ---- 撮影 ----
  shootBtn.addEventListener('click', () => {
    // 保存容量を圧迫しないよう、幅800pxまで縮小してから保存する
    const maxWidth = 800;
    const scale = Math.min(1, maxWidth / video.videoWidth);
    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

    pendingPhotoDataUrl = canvas.toDataURL('image/jpeg', 0.75);
    pendingPosition = lastPosition;
    pendingTimestamp = new Date().toISOString();

    capturedPhoto.src = pendingPhotoDataUrl;
    editInfo.textContent = pendingPosition
      ? '緯度 ' + pendingPosition.latitude.toFixed(6) + ' / 経度 ' + pendingPosition.longitude.toFixed(6)
      : '位置情報は取得できませんでした';
    memo.value = '';

    cameraPanel.style.display = 'none';
    editPanel.style.display = 'block';
    status.textContent = '写真を確認して、必要ならメモを入力・音声入力してください。';
  });

  retakeBtn.addEventListener('click', () => {
    cameraPanel.style.display = 'block';
    editPanel.style.display = 'none';
    status.textContent = 'カメラが起動しました。撮影ボタンを押してください。';
  });

  // ---- この記録を保存 ----
  saveSpotBtn.addEventListener('click', () => {
    const spot = {
      id: Date.now(),
      timestamp: pendingTimestamp,
      lat: pendingPosition ? pendingPosition.latitude : null,
      lng: pendingPosition ? pendingPosition.longitude : null,
      photo: pendingPhotoDataUrl,
      memo: memo.value
    };
    spots.push(spot);

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(spots));
    } catch (e) {
      status.textContent = '保存容量がいっぱいの可能性があります: ' + e.message;
    }

    renderSpots();
    cameraPanel.style.display = 'block';
    editPanel.style.display = 'none';
    status.textContent = '記録を保存しました。次の場所へ進みましょう。';
  });

  // ---- 音声入力(このメモ欄に追記する) ----
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micBtn.disabled = true;
    micBtn.textContent = '音声入力 非対応';
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = true;
    recognition.interimResults = true;

    let isListening = false;
    let baseText = '';

    recognition.addEventListener('start', () => {
      isListening = true;
      baseText = memo.value;
      micBtn.textContent = '音声入力停止';
      micBtn.classList.add('recording');
    });

    recognition.addEventListener('result', (event) => {
      let finalChunk = '';
      let interimText = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) finalChunk += transcript;
        else interimText += transcript;
      }
      if (finalChunk) baseText += finalChunk;
      memo.value = baseText + interimText;
    });

    recognition.addEventListener('error', (event) => {
      status.textContent = '音声認識エラー: ' + event.error;
    });

    recognition.addEventListener('end', () => {
      isListening = false;
      micBtn.textContent = '音声入力開始';
      micBtn.classList.remove('recording');
    });

    micBtn.addEventListener('click', () => {
      if (isListening) recognition.stop();
      else recognition.start();
    });
  }

  // ---- 記録一覧の表示 ----
  function renderSpots() {
    spotCount.textContent = spots.length;
    emptyMsg.style.display = spots.length === 0 ? 'block' : 'none';
    spotList.innerHTML = '';

    // 新しい記録が上に来るよう逆順で表示
    [...spots].reverse().forEach((spot) => {
      const card = document.createElement('div');
      card.className = 'spot-card';

      const time = new Date(spot.timestamp).toLocaleString('ja-JP');
      const locText = (spot.lat != null)
        ? spot.lat.toFixed(5) + ', ' + spot.lng.toFixed(5)
        : '位置情報なし';

      card.innerHTML =
        '<img src="' + spot.photo + '" alt="記録した写真" />' +
        '<div class="spot-info">' +
          time + '<br>' + locText +
          '<div class="memo">' + (spot.memo ? escapeHtml(spot.memo) : '(メモなし)') + '</div>' +
        '</div>';
      spotList.appendChild(card);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  clearAllBtn.addEventListener('click', () => {
    if (!confirm('全ての記録を削除します。よろしいですか？')) return;
    spots = [];
    localStorage.removeItem(STORAGE_KEY);
    renderSpots();
  });

  renderSpots();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>音声テキスト化 最小サンプル</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    padding: 16px;
  }
  h1 { font-size: 18px; margin-bottom: 12px; }
  #status { font-size: 13px; color: #5f5e5a; margin-bottom: 12px; }
  button {
    background: #2a7a4b;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-right: 8px;
    margin-bottom: 12px;
  }
  button:disabled { background: #999; }
  #micBtn.recording { background: #b93a1a; }
  textarea {
    width: 100%;
    max-width: 480px;
    min-height: 160px;
    font-size: 15px;
    line-height: 1.7;
    padding: 12px;
    border-radius: 8px;
    border: 0.5px solid rgba(0,0,0,0.2);
    background: #fff;
    color: #1a1a18;
    display: block;
    margin-bottom: 8px;
  }
  #saveStatus { font-size: 12px; color: #2a7a4b; }
</style>
</head>
<body>

<h1>音声テキスト化 最小サンプル</h1>
<p id="status">「音声入力開始」を押して話すと、下のテキスト欄に文字が入力されます。</p>

<button id="micBtn">音声入力開始</button>
<button id="clearBtn">クリア</button>

<!-- 音声認識の結果が入るテキストエリア。話した内容もここに追記されるし、手で自由に編集もできる -->
<textarea id="memo" placeholder="ここに音声の内容が入ります。手入力での編集も可能です。"></textarea>
<p id="saveStatus"></p>

<script>
  const micBtn = document.getElementById('micBtn');
  const clearBtn = document.getElementById('clearBtn');
  const memo = document.getElementById('memo');
  const status = document.getElementById('status');
  const saveStatus = document.getElementById('saveStatus');

  const STORAGE_KEY = 'machilog_voice_memo_demo';

  // ページを開いた時点で、前回保存したテキストがあれば復元する(=「帰ってから編集」を成立させる部分)
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    memo.value = saved;
    saveStatus.textContent = '前回保存した内容を読み込みました。';
  }

  // テキストエリアの内容が変わるたびに自動でlocalStorageへ保存する
  // (手入力での編集、音声入力どちらの変更もここで拾われる)
  let saveTimer = null;
  memo.addEventListener('input', () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      localStorage.setItem(STORAGE_KEY, memo.value);
      saveStatus.textContent = '保存しました(' + new Date().toLocaleTimeString('ja-JP') + ')';
    }, 500);
  });

  clearBtn.addEventListener('click', () => {
    memo.value = '';
    localStorage.removeItem(STORAGE_KEY);
    saveStatus.textContent = 'クリアしました。';
  });

  // SafariはwebkitSpeechRecognitionという接頭辞付きの名前になっている
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    status.textContent = 'この端末・ブラウザは音声入力に対応していません。テキスト欄に直接入力してください。';
    micBtn.disabled = true;
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = true;   // 話し続ける限り認識を続ける
    recognition.interimResults = true; // 確定前の途中結果もリアルタイムで受け取る

    let isListening = false;
    // テキストエリアの「確定済みテキストの末尾位置」を覚えておき、認識中の仮テキストを毎回そこに上書きする
    let baseText = '';
    let interimText = '';

    recognition.addEventListener('start', () => {
      isListening = true;
      baseText = memo.value;
      micBtn.textContent = '音声入力停止';
      micBtn.classList.add('recording');
      status.textContent = '聞き取り中… 話してください。';
    });

    recognition.addEventListener('result', (event) => {
      let finalChunk = '';
      interimText = '';

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalChunk += transcript;
        } else {
          interimText += transcript;
        }
      }

      if (finalChunk) {
        baseText += finalChunk;
      }
      // 確定分 + 認識中(未確定)分を合わせて表示。編集はいつでも自由にできる
      memo.value = baseText + interimText;
    });

    recognition.addEventListener('error', (event) => {
      status.textContent = '音声認識エラー: ' + event.error;
    });

    recognition.addEventListener('end', () => {
      isListening = false;
      micBtn.textContent = '音声入力開始';
      micBtn.classList.remove('recording');
      status.textContent = '認識を終了しました。テキストは自由に編集できます。';
      // 手動保存トリガー(inputイベントが発火しない場合の保険)
      localStorage.setItem(STORAGE_KEY, memo.value);
      saveStatus.textContent = '保存しました(' + new Date().toLocaleTimeString('ja-JP') + ')';
    });

    micBtn.addEventListener('click', () => {
      if (isListening) {
        recognition.stop();
      } else {
        recognition.start();
      }
    });
  }
</script>

</body>
</html>
